# Color definitions
darkplus_primary="colour32"
darkplus_lighter="colour231"
darkplus_light="colour244"
darkplus_dark="colour237"
darkplus_darker="colour236"

darkplus_active="colour231"
darkplus_last="colour39"

# Plugin supports
# tmux-prefix-highlight
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_fg $darkplus_lighter
set -g @prefix_highlight_bg $darkplus_primary

# General
set -g status-interval 5
set -g status on
set -g status-right-length 60
# was set to 50 by cryptomilk, my hostnames are loooooooooonger

# Window status alignment
set -g status-justify left

# Colors
set -g status-style "fg=white,bg=$darkplus_darker"

# Pane border
set -g pane-border-style "fg=$darkplus_darker"
set -g pane-active-border-style "fg=$darkplus_light"
set -g display-panes-colour $darkplus_darker
set -g display-panes-active-colour $darkplus_light
set -gqw window-status-activity-style none

# Clock mode
setw -g clock-mode-colour $darkplus_primary

# Messages
set -g message-style "fg=$darkplus_lighter,bg=$darkplus_darker"
set -g message-command-style "fg=$darkplus_primary,bg=$darkplus_darker"
